<!DOCTYPE html>

<html>
<head>
<title>FleetFlow Login</title>

<style>
body{
  background:#020617;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial;
  color:white;
}

.box{
  background:#0f172a;
  padding:40px;
  border-radius:12px;
  text-align:center;
  width:320px;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:6px;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:6px;
  background:#22c55e;
  font-weight:bold;
  cursor:pointer;
}
</style>

</head>

<body>

<div class="box">
<h2>🚚 FleetFlow Login</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script>
function login(){
  const u=document.getElementById("user").value;
  const p=document.getElementById("pass").value;

  if(u==="admin" && p==="123"){
    window.location="index.html";
  }else{
    alert("Invalid login");
  }
}
</script>

</body>
</html>
