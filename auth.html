<!DOCTYPE html>

<html>
<head>
<title>FleetFlow Authentication</title>

<style>
body{
  margin:0;
  background:#020617;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

.box{
  background:#0f172a;
  padding:40px;
  width:320px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:6px;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:6px;
  background:#22c55e;
  cursor:pointer;
  font-weight:bold;
}

.link{
  margin-top:10px;
  color:#38bdf8;
  cursor:pointer;
}

.status{
  margin-top:10px;
  font-size:14px;
}
</style>

</head>

<body>

<div class="box">

<!-- SIGN IN -->

<div id="login">
<h2>🚚 FleetFlow Sign In</h2>

<input id="luser" placeholder="Username">
<input id="lpass" type="password" placeholder="Password">

<button onclick="login()">Sign In</button>

<p id="loginStatus" class="status" style="color:#ef4444;"></p>

<p class="link" onclick="showRegister()">Create account</p>
</div>

<!-- REGISTER -->

<div id="register" style="display:none;">
<h2>Register</h2>

<input id="ruser" placeholder="Username">
<input id="remail" placeholder="Email">
<input id="rpass" type="password" placeholder="Password">

<button onclick="register()">Register</button>

<p id="regStatus" class="status"></p>

<p class="link" onclick="showLogin()">Back to Sign In</p>
</div>

</div>

<script>

function showRegister(){
  document.getElementById("login").style.display="none";
  document.getElementById("register").style.display="block";
}

function showLogin(){
  document.getElementById("register").style.display="none";
  document.getElementById("login").style.display="block";
}

function login(){
  const u=document.getElementById("luser").value;
  const p=document.getElementById("lpass").value;

  if(u==="admin" && p==="123"){
    window.location="dashboard.html";   // ✅ IMPORTANT REDIRECT
  }else{
    document.getElementById("loginStatus").innerText="Invalid credentials";
  }
}

function register(){
  const u=document.getElementById("ruser").value;
  const e=document.getElementById("remail").value;
  const p=document.getElementById("rpass").value;

  if(u==="" || e==="" || p===""){
    document.getElementById("regStatus").style.color="#ef4444";
    document.getElementById("regStatus").innerText="Please fill all fields";
    return;
  }

  document.getElementById("regStatus").style.color="#22c55e";
  document.getElementById("regStatus").innerText="Registered successfully ✔";

  setTimeout(showLogin,1500);
}

</script>

</body>
</html>
